version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: fintrack-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - fintrack-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintrack-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/fintrack
    depends_on:
      - mongodb
    networks:
      - fintrack-network

networks:
  fintrack-network:
    driver: bridge

volumes:
  mongodb_data:
